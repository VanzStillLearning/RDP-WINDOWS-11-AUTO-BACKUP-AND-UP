name: RDP-BOT-WA-AUTO-LOOP

on:
  workflow_dispatch:
  # push:
  #   branches: [ main ] # Buka hashtag ini kalau mau otomatis jalan pas lu update file

concurrency:
  group: rdp-wa-loop
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
      actions: write

    steps:
      - name: "1. Checkout Repository"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: "2. Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: "3. Cache Node Modules"
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: "4. Setup VPN Cloudflare WARP (Versi Ngebut)"
        run: |
          echo "Install WARP via APT (Jauh lebih cepat dari Windows MSI)..."
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          
          # Install & Connect
          sudo apt-get update -q
          sudo apt-get install -y cloudflare-warp
          
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode warp
          warp-cli --accept-tos connect
          
          sleep 3
          echo "==============================="
          echo "IP VPN Aktif Sekarang:"
          curl -4 ifconfig.me
          echo -e "\n==============================="

      - name: "5. Install Dependencies"
        run: |
          if [ -d "node_modules" ]; then
            echo "Folder node_modules ditemukan dari Cache! Skip npm install."
          else
            echo "Folder node_modules tidak ditemukan! Menjalankan npm install..."
            npm install
          fi

      - name: "6. Run Bot (Auto-Restart & Limit 5 Jam)"
        run: |
          # Ini versi Linux dari script PowerShell lu. 
          # Bot jalan di depan (foreground) biar log/QR code kelihatan di tab Actions.
          # Kalau crash, otomatis restart dalam 5 detik.
          timeout 5h bash -c '
            while true; do
              echo "Menjalankan Bot..."
              npm start
              echo "Bot crash atau berhenti, restart dalam 5 detik..."
              sleep 5
            done
          ' || true

      - name: "7. Auto-Backup Session & File"
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          
          if git diff-index --quiet HEAD --; then
            echo "Tidak ada perubahan file (Session aman)."
          else
            echo "Ditemukan perubahan file. Melakukan commit..."
            git commit -m "Auto-backup data bot (5 jam) [skip ci]"
            git push origin HEAD:main
          fi

      - name: "8. Auto-Up (Trigger Siklus Berikutnya)"
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "Memicu ulang workflow untuk 5 jam ke depan..."
          # Command ini otomatis ngebaca nama file workflow lu yang lagi jalan
          gh workflow run "${{ github.workflow }}" --ref main
          
