name: WA Bot Continuous (WARP + Auto Backup)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      
jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Tarik file terbaru
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }} # Wajib pakai PAT di sini biar bisa auto-backup
          clean: true

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Cache node_modules
      - name: Cache node_modules
        id: cache-npm
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # 4. Setup Cloudflare WARP VPN
      - name: Setup Cloudflare WARP
        run: |
          echo "Menyiapkan Cloudflare WARP..."
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          sudo apt-get install -y cloudflare-warp
          
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode warp
          warp-cli --accept-tos connect
          
          # Jeda bentar biar koneksi masuk ke VPN
          sleep 5
          echo "IP VPN Aktif:"
          curl -4 ifconfig.me
          echo ""

      # 5. Jalankan Bot & Lock Workflow (Keep Alive 5 Jam)
      - name: Start Bot and Wait 5 Hours
        run: |
          # Cek node_modules, kalau gada baru install
          if [ ! -d "node_modules" ]; then 
            echo "Install package..."
            npm install
          else
            echo "node_modules dari cache ketemu, skip install..."
          fi
          
          # Jalankan bot di background dan simpan Process ID-nya (PID)
          echo "Mulai menjalankan bot..."
          npm start & 
          BOT_PID=$!
          echo "Bot berjalan dengan PID: $BOT_PID"
          
          # Menahan (lock) sistem agar tidak lanjut ke step berikutnya selama 5 jam (18000 detik)
          echo "Bot dikunci selama 5 jam. Workflow dalam status In Progress..."
          sleep 18000 
          
          # Setelah 5 jam habis, kill process bot agar bisa lanjut ke proses backup
          echo "Waktu habis, mematikan bot untuk persiapan auto-backup..."
          kill $BOT_PID || true

      # 6. Auto Backup (Commit & Push file yang berubah/session baru)
      - name: Auto Backup Session to Repo
        run: |
          echo "Memulai backup data session..."
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          # Cek apakah ada file yang berubah (misal folder session)
          if git diff-index --quiet HEAD --; then
            echo "Tidak ada perubahan data untuk di-backup."
          else
            # Pakai [skip ci] biar push ini nggak numpuk trigger workflow baru
            git commit -m "Auto backup session & data (5 jam) [skip ci]"
            git push https://${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
            echo "Backup sukses di-push ke repository!"
          fi

      # 7. Auto Trigger Workflow (Biar looping)
      - name: Trigger Next Run
        run: |
          echo "Memicu ulang workflow untuk 5 jam berikutnya..."
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/wabot.yml/dispatches \
            -d '{"ref":"main"}'
            
